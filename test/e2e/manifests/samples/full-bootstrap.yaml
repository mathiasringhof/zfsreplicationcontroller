apiVersion: zfsreplication.ringhof.io/v1alpha1
kind: ZFSReplicationRun
metadata:
  name: e2e-full
  namespace: storage
spec:
  source:
    nodeName: worker-a
    dataset: tank/src
  target:
    nodeName: worker-b
    dataset: tank/dst
  syncoid:
    noSyncSnap: false
    noRollback: true
    forceDelete: true
    compress: none
    receiveUnmounted: true
    receiveResumable: true
