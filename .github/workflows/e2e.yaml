name: E2E

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  vm-e2e:
    name: VM k3s ZFS E2E
    runs-on:
      - self-hosted
      - zfsreplication-e2e
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Doctor
        run: ./test/e2e/doctor.sh

      - name: Run full E2E
        run: ./test/e2e/run.sh
