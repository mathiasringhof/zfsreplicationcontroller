apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsreplicationruns.zfsreplication.ringhof.io
spec:
  group: zfsreplication.ringhof.io
  names:
    kind: ZFSReplicationRun
    listKind: ZFSReplicationRunList
    plural: zfsreplicationruns
    singular: zfsreplicationrun
    shortNames:
      - zfsreprun
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "self == oldSelf"
                  message: "spec is immutable"
              required:
                - source
                - target
              properties:
                source:
                  type: object
                  required:
                    - nodeName
                    - dataset
                  properties:
                    nodeName:
                      type: string
                      minLength: 1
                    dataset:
                      type: string
                      minLength: 1
                target:
                  type: object
                  required:
                    - nodeName
                    - dataset
                  properties:
                    nodeName:
                      type: string
                      minLength: 1
                    dataset:
                      type: string
                      minLength: 1
                syncoid:
                  type: object
                  properties:
                    noSyncSnap:
                      type: boolean
                      default: false
                    noRollback:
                      type: boolean
                      default: true
                    forceDelete:
                      type: boolean
                      default: false
                    compress:
                      type: string
                      enum:
                        - ""
                        - none
                        - gzip
                        - pigz
                        - zstd
                        - zstdmt
                        - xz
                        - lzop
                        - lz4
                    receiveUnmounted:
                      type: boolean
                      default: true
                    receiveResumable:
                      type: boolean
                      default: true
                    includeSnaps:
                      type: array
                      items:
                        type: string
                    excludeSnaps:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - StartingReceiver
                    - ReceiverReady
                    - Running
                    - Succeeded
                    - Failed
                senderJobName:
                  type: string
                receiveTaskName:
                  type: string
                receiverPodName:
                  type: string
                receiverPodIP:
                  type: string
                sshSecretName:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                lastError:
                  type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Source
          type: string
          jsonPath: .spec.source.dataset
        - name: Target
          type: string
          jsonPath: .spec.target.dataset
