apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zfsreceivetasks.zfsreplication.ringhof.io
spec:
  group: zfsreplication.ringhof.io
  names:
    kind: ZFSReceiveTask
    listKind: ZFSReceiveTaskList
    plural: zfsreceivetasks
    singular: zfsreceivetask
    shortNames:
      - zfsrecvtask
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "self == oldSelf"
                  message: "spec is immutable"
              required:
                - runRef
                - nodeName
                - destination
                - ssh
              properties:
                runRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                nodeName:
                  type: string
                  minLength: 1
                destination:
                  type: object
                  required:
                    - dataset
                  properties:
                    dataset:
                      type: string
                      minLength: 1
                ssh:
                  type: object
                  required:
                    - authorizedPublicKey
                    - expiresAt
                  properties:
                    authorizedPublicKey:
                      type: string
                      minLength: 1
                    expiresAt:
                      type: string
                      format: date-time
                policy:
                  type: object
                  properties:
                    receiveUnmounted:
                      type: boolean
                      default: true
                    receiveResumable:
                      type: boolean
                      default: true
                    allowRollback:
                      type: boolean
                      default: false
                    allowDestroy:
                      type: boolean
                      default: false
                    allowMount:
                      type: boolean
                      default: false
                    allowSyncSnapshotDestroy:
                      type: boolean
                      default: false
                    syncSnapshotIdentifier:
                      type: string
                    compression:
                      type: string
                      default: none
                      enum:
                        - none
                        - gzip
                        - pigz
                        - zstd
                        - zstdmt
                        - xz
                        - lzop
                        - lz4
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Completed
                    - Failed
                endpoint:
                  type: object
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                      format: int32
                ssh:
                  type: object
                  properties:
                    hostKey:
                      type: string
                receiverPod:
                  type: object
                  properties:
                    name:
                      type: string
                    uid:
                      type: string
                error:
                  type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Destination
          type: string
          jsonPath: .spec.destination.dataset
