apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zfsreplication-controller
rules:
  - apiGroups:
      - zfsreplication.example.com
    resources:
      - zfsreplicationschedules
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - zfsreplication.example.com
    resources:
      - zfsreplicationruns
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - zfsreplication.example.com
    resources:
      - zfsreplicationruns/status
      - zfsreplicationschedules/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
