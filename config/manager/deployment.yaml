apiVersion: apps/v1
kind: Deployment
metadata:
  name: zfsreplication-controller
  namespace: zfsreplication-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zfsreplication-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zfsreplication-controller
    spec:
      serviceAccountName: zfsreplication-controller
      containers:
        - name: manager
          image: ghcr.io/mathiasringhof/zfsreplicationcontroller:main
          imagePullPolicy: Always
          command:
            - /usr/local/bin/manager
          env:
            - name: RELEASE_IMAGE
              value: ghcr.io/mathiasringhof/zfsreplicationcontroller:main
          ports:
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
